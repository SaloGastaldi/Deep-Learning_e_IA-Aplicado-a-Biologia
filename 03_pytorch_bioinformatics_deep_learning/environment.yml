name: pytorch-bioinformatics
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - jupyter
  - seaborn

  # PyTorch
  - pytorch
  - torchvision
